name: content-guards

# Server-side content safety nets that complement the local pre-commit hooks
# (which only run in clones where `pre-commit install` / the git hook was set up).
#
#   1. gitleaks       — secret scanning. BLOCKING: a leaked secret fails CI.
#   2. ai-signatures  — embedded AI-authorship signatures. WARN-only for now.
#
# This file is the single-source master in orchestrator/standards/ci/. It is
# copied verbatim into each repo's .github/workflows/. Edit the master, then
# re-roll; do not hand-edit per-repo copies.

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  ai-signatures:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Scan content for AI-authorship signatures (WARN, non-blocking)
        shell: bash
        run: |
          # Hard-ban signatures only (no fuzzy prose tells, which false-positive
          # on legitimate writing about AI). The standards / notes / .claude /
          # .github corpus is allowlisted because it quotes these very strings as
          # examples of what to ban.
          #
          # TODO(promote-to-gate): after a clean period, replace the final
          #   `exit 0` with `exit 1` when $hits is non-empty, turning this from a
          #   warning into a blocking check. Tracked in standards/ci/README.md.
          patterns='co-authored-by:.*(claude|anthropic|copilot|chatgpt|gpt-)|generated (with|by) (claude|chatgpt|copilot|gpt|anthropic|openai)'
          hits=$(git ls-files -z \
            | grep -zvE '(^|/)(standards|notes)/|(^|/)\.(claude|github)/|(^|/)(CLAUDE|MEMORY)\.md$' \
            | xargs -0 -r grep -IinE "$patterns" 2>/dev/null || true)
          if [ -n "$hits" ]; then
            {
              echo "## AI-authorship signature scan — WARN (non-blocking)"
              echo
              echo "Embedded AI-authorship signatures were found. Remove them per the"
              echo "no-AI-attribution rule. This is a warning for now and will become a"
              echo "hard gate after a clean period."
              echo
              echo '```'
              echo "$hits"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::warning::AI-authorship signatures found (see job summary); non-blocking for now."
          else
            echo "No AI-authorship signatures found." >> "$GITHUB_STEP_SUMMARY"
          fi
          exit 0
