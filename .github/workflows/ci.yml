name: CI

on: [push, pull_request]

jobs:
  lint-and-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - name: Sync dependencies
        run: uv sync
      - name: Lint (ruff)
        run: uvx ruff check src
      - name: Byte-compile sources
        run: uv run python -m compileall src
